<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Animes Kala</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=5">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(20px);
            animation: fadeUp 0.6s ease both;
            text-align: center;
        }

        .login-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .login-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.05rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all var(--t-fast);
        }

        .form-input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(167,139,250,0.15);
            background: rgba(255,255,255,0.08);
        }

        .btn-submit {
            width: 100%;
            background: var(--grad-hero);
            border: none;
            border-radius: 12px;
            padding: 1rem;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--t-smooth);
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(167,139,250,0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(167,139,250,0.4);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .error-msg {
            color: #ef4444;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color var(--t-fast);
        }

        .back-link:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <h1 class="login-title">Admin <span class="highlight">Login</span></h1>
            <p class="login-subtitle">Panel de control de Animes Kala</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required autofocus>
                </div>
                
                <button type="submit" class="btn-submit">Ingresar al Panel</button>
                <div id="error-msg" class="error-msg">Contraseña incorrecta</div>
            </form>

            <a href="index.html" class="back-link">← Volver al Tracker</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.querySelector('.btn-submit');
            
            errorMsg.style.display = 'none';
            btn.textContent = 'Verificando...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // Guardar token en localStorage
                    localStorage.setItem('kala_admin_token', data.token);
                    // Redirigir a la página principal
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = data.error || 'Error de autenticación';
                    errorMsg.style.display = 'block';
                    btn.textContent = 'Ingresar al Panel';
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.textContent = 'Error de conexión con el servidor.';
                errorMsg.style.display = 'block';
                btn.textContent = 'Ingresar al Panel';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
